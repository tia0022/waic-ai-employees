function closingHTML(){return `<div class="closing"><div class="panel"><div class="panel-head"><span>Before / After · 从人工链路到 MINOS AI 矩阵</span><span>5 项业务结果</span></div><div class="ba-grid"><div class="ba-side before"><h2>传统人工</h2>${DEMO_DATA.beforeAfter.map((x,i)=>`<div class="ba-item" style="animation:baItemIn .4s var(--ease) ${i*.08}s both"><span>${x.item}</span><b>${x.before}</b></div>`).join('')}</div><div class="ba-side"><h2>MINOS 平台</h2>${DEMO_DATA.beforeAfter.map((x,i)=>`<div class="ba-item" style="animation:baItemIn .4s var(--ease) ${.1+i*.08}s both"><span>${x.item} · ${A[x.byAgent].name}</span><b style="color:${A[x.byAgent].color}">${x.after} ${x.delta}</b></div>`).join('')}</div></div></div><div class="panel"><div class="panel-head"><span>本次主流程聚焦 5 个核心Agent · 平台支持扩展能力</span><button class="secondary-btn" onclick="openCatalog()">查看扩展 Catalog</button></div><div class="matrix"><div class="agent-matrix">${all.map((id,i)=>`<div class="matrix-card ${A[id].tier===3?'t3':''}" style="--c:${A[id].color};animation-delay:${i*.05}s" data-kpi="${esc(A[id].duty+' · '+kpiText(id))}" onclick="openAgent('${id}')"><div class="mini-avatar">${avatar(id)}</div><b>${A[id].tier===3?'可调用':'✓'} ${A[id].name.replace('小明','')}</b><span>${A[id].role||'Extension Catalog'}</span></div>`).join('')}</div><div class="closing-foot" style="flex-direction:column;align-items:stretch;gap:8px"><div style="display:flex;gap:6px;flex-wrap:wrap">${['国家专精特新「小巨人」','网信办生成式 AI 备案','合作贷款超 1500 亿（零不良）','中美海关 100% 直连','北美 60+ 港口码头','全球 200+ 航司'].map(t=>`<span style="background:rgba(0,201,167,.09);border:1px solid rgba(0,201,167,.25);border-radius:999px;padding:2px 9px;font-size:10px;color:#86efac;white-space:nowrap">${t}</span>`).join('')}</div><div style="display:flex;align-items:center;justify-content:space-between"><div><b>本次订单端到端 T+15 天 · 净利 ¥164/杯 · 利润率 33.5%</b><p>MINOS 平台 · 让每一件中国好货，以最高确定性抵达全球。</p></div><button class="primary-btn" onclick="resetDemo()">重新演示</button></div></div></div></div></div>`}
function bindScene(){document.querySelectorAll('.org-node,.matrix-card').forEach(el=>el.addEventListener('mousemove',markActive));}
function markActive(){resetIdle()}function launch(){if(started)return;started=true;app.classList.add('started');scene=0;sceneDir=1;renderScene();resetIdle()}
function nextScene(){if(!started){launch();return}if(scene<SCENES.length-1){sceneDir=1;scene++;renderScene()}else resetDemo();resetIdle()}function prevScene(){if(!started)return;if(scene>0){sceneDir=-1;scene--;renderScene()}resetIdle()}
function showToast(id){const ag=A[id],host=document.getElementById('toastHost'),el=document.createElement('div');el.className='toast';el.style.setProperty('--c',ag.color);el.innerHTML=`<div class="mini-avatar">${avatar(id)}</div><div><b>${ag.name}</b><p>${ag.toastText||ag.duty}</p></div>`;el.onclick=()=>openAgentMini(id);host.appendChild(el);setTimeout(()=>el.remove(),2600)}
function openAgentMini(id){modalTitle.textContent=A[id].name;modalBody.innerHTML=`<div class="catalog-card" style="--c:${A[id].color};max-width:520px"><div class="mini-avatar">${avatar(id)}</div><h3>${A[id].role||'Agent Capability'}</h3><p><b>职责：</b>${A[id].duty}</p><p><b>KPI：</b>${kpiText(id)}</p><p><b>AI vs 人工：</b>${A[id].vsHuman?A[id].vsHuman.metric+'：'+A[id].vsHuman.ai+' / '+A[id].vsHuman.human:'Catalog only'}</p></div>`;modal.classList.add('show')}
function openAgentModal(id){modalTitle.textContent=A[id].name+' · 历史输出';modalBody.innerHTML=workbenchHTML(id);modal.classList.add('show')}
function openCatalog(){modalTitle.textContent='扩展能力 Catalog · L3 5 个 Agent';modalBody.innerHTML=`<div class="catalog-grid">${l3.map(id=>`<div class="catalog-card" style="--c:${A[id].color}"><div class="mini-avatar">${avatar(id)}</div><h3>${A[id].name}</h3><p><b>职责：</b>${A[id].duty}</p><p><b>KPI：</b>${kpiText(id)}</p><p><b>应用场景：</b>展位观众可自助探索，主流程不抢占核心 5 个 Agent 的叙事焦点。</p></div>`).join('')}</div>`;modal.classList.add('show')}
function openAgent(id){if(WORK[id])openAgentModal(id);else openAgentMini(id)}
function openSnapshot(i){const f=DEMO_DATA.vaultFiles[i];modalTitle.textContent='AI 决策审计快照 · '+f.name;modalBody.innerHTML=`<div class="snapshot">INPUT_HASH: ${f.hash}\nMASTER_HASH: ${DEMO_DATA.masterHash}\nBLOCK_ID: ${DEMO_DATA.blockId}\nMODEL_VERSION: MINOS-agent-runtime-v4.0\nRULES_HIT: cross_border_order_integrity / human_in_the_loop_required / audit_trace_100pct\nOUTPUT: ${f.name} 已写入 Compliance Vault，支持任意决策回放。\nHUMAN_CONFIRM_TS: ${f.t}\nAUDITOR_NOTE: 该快照由白盒存证小明生成，输入、模型、规则、输出与人工确认均可追溯。</div>`;modal.classList.add('show')}
function resetDemo(){started=false;scene=0;lastToast='';app.classList.remove('started');stage.innerHTML='';document.getElementById('archiveCards').innerHTML='';buildAgentStatus();buildTimeline();updateMission();updateFooter();resetIdle()}function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(resetDemo,90000)}
document.getElementById('launchBtn').onclick=launch;document.getElementById('nextBtn').onclick=nextScene;document.getElementById('prevBtn').onclick=prevScene;document.getElementById('resetBtn').onclick=resetDemo;document.getElementById('modalClose').onclick=()=>modal.classList.remove('show');modal.onclick=e=>{if(e.target===modal)modal.classList.remove('show')};document.getElementById('catalogFloat').onclick=openCatalog;document.getElementById('catalogBtnTop').onclick=openCatalog;document.getElementById('supportBtn').onclick=()=>{modalTitle.textContent='L2 支持 Agent · 本次订单穿插触发';modalBody.innerHTML=`<div class="catalog-grid">${l2.map(id=>`<div class="catalog-card" style="--c:${A[id].color}"><div class="mini-avatar">${avatar(id)}</div><h3>${A[id].name}</h3><p>${A[id].duty}</p><p>${kpiText(id)}</p></div>`).join('')}</div>`;modal.classList.add('show')};
document.querySelectorAll('.quick-scenes button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.quick-scenes button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const p=btn.dataset.preset;if(!document.querySelector('[data-token]'))return;if(p==='de'){document.querySelector('[data-token="product"]').value='义乌玩具 ×2000';document.querySelector('[data-token="dest"]').value='德国 · 汉堡';document.querySelector('[data-token="platform"]').value='Shopify'}else if(p==='uk'){document.querySelector('[data-token="product"]').value='苏州丝巾 ×800';document.querySelector('[data-token="dest"]').value='英国 · 伦敦';document.querySelector('[data-token="platform"]').value='SHEIN'}else{document.querySelector('[data-token="product"]').value='景德镇手工茶杯 ×500 只';document.querySelector('[data-token="dest"]').value='美国 · 洛杉矶';document.querySelector('[data-token="platform"]').value='Amazon + TikTok Shop'}updateMission();resetIdle()});
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();nextScene()}else if(e.key==='ArrowRight')nextScene();else if(e.key==='ArrowLeft')prevScene();else if(/[1-9]/.test(e.key)){started=true;app.classList.add('started');scene=Math.min(Number(e.key)-1,SCENES.length-1);renderScene();updateFooter()}resetIdle()});document.addEventListener('mousemove',resetIdle);document.addEventListener('click',resetIdle);initLaunch();resetIdle();
</script>
</body>
