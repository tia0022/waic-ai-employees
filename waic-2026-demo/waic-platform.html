<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明心数智 · 产业出海AI服务平台 · WAIC 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1e;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}

/* HEADER */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:rgba(15,23,42,0.95);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;position:relative;z-index:10}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo .badge{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.hdr-logo .title{font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:.3px}
.hdr-logo .sub{font-size:11px;color:#64748b;margin-left:4px}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:11px}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#00c9a7;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.hdr-tag{font-size:10px;background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);padding:2px 7px;border-radius:3px}

/* LAYOUT */
#main{flex:1;display:grid;grid-template-columns:200px 1fr 270px;gap:0;overflow:hidden;min-height:0}
#left{background:#0d1629;border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow:hidden}
#center{display:flex;flex-direction:column;overflow:hidden;background:#0a0f1e}
#right{background:#0d1629;border-left:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow:hidden}

/* PANELS */
.panel-hdr{padding:10px 14px 8px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.panel-title{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px}
.panel-body{flex:1;overflow-y:auto;padding:10px}

/* JOURNEY */
.journey-node{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:4px;transition:.2s;cursor:default}
.journey-node.active{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25)}
.journey-node:not(.active){border:1px solid transparent}
.jn-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.jn-icon.done{background:rgba(0,201,167,.15);border-color:rgba(0,201,167,.3)}
.jn-icon.active-node{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);animation:glow .8s ease-in-out infinite alternate}
@keyframes glow{from{box-shadow:0 0 4px rgba(99,102,241,.3)}to{box-shadow:0 0 10px rgba(99,102,241,.6)}}
.jn-label{font-size:10.5px;color:#94a3b8;line-height:1.35;padding-top:4px}
.jn-label.active-label{color:#c7d2fe;font-weight:600}

/* AGENT STATUS */
.agent-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;margin-bottom:3px}
.agent-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.agent-name{font-size:10px;color:#94a3b8;flex:1}
.agent-badge{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;padding:0 12px}
.tab-btn{padding:9px 14px;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;white-space:nowrap}
.tab-btn.active{color:#c7d2fe;border-bottom-color:#6366f1}
.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab-pane.active{display:flex}

/* CHAT */
#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.bubble{padding:9px 12px;border-radius:10px;font-size:11.5px;line-height:1.6;max-width:calc(100% - 40px)}
.msg.user .bubble{background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.25);color:#c7d2fe;border-radius:10px 2px 10px 10px}
.msg.orch .av{background:rgba(99,102,241,.2);color:#818cf8}
.msg.orch .bubble{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:2px 10px 10px 10px}
.msg.supply .av{background:rgba(0,201,167,.2);color:#00c9a7}
.msg.supply .bubble{background:rgba(0,201,167,.04);border:1px solid rgba(0,201,167,.15);border-radius:2px 10px 10px 10px}
.msg.mkt .av{background:rgba(249,115,22,.2);color:#f97316}
.msg.mkt .bubble{background:rgba(249,115,22,.04);border:1px solid rgba(249,115,22,.15);border-radius:2px 10px 10px 10px}
.msg.comp .av{background:rgba(245,158,11,.2);color:#f59e0b}
.msg.comp .bubble{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);border-radius:2px 10px 10px 10px}
.msg.log .av{background:rgba(56,189,248,.2);color:#38bdf8}
.msg.log .bubble{background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:2px 10px 10px 10px}
.msg.ana .av{background:rgba(167,139,250,.2);color:#a78bfa}
.msg.ana .bubble{background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:2px 10px 10px 10px}
.msg.vault .av{background:rgba(52,211,153,.2);color:#34d399}
.msg.vault .bubble{background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15);border-radius:2px 10px 10px 10px}
.msg-meta{font-size:9.5px;color:#475569;margin-bottom:3px}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#64748b;margin:0 1px;animation:blink 1s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* INPUT */
#input-area{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;display:flex;gap:8px}
#chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:12px;outline:none;resize:none;height:36px;font-family:inherit}
#chat-input:focus{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.04)}
#send-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;padding:0 14px;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;transition:.15s}
#send-btn:hover{opacity:.85}#send-btn:disabled{opacity:.4;cursor:not-allowed}

/* CARDS */
#cards{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.card{border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,.06)}
.card-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.card-icon{font-size:14px}
.card-title{font-size:11px;font-weight:700;color:#e2e8f0;flex:1}
.card-badge{font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:#64748b}
.dc-supply{background:rgba(0,201,167,.04);border-color:rgba(0,201,167,.12)}
.dc-mkt{background:rgba(249,115,22,.04);border-color:rgba(249,115,22,.12)}
.dc-comp{background:rgba(245,158,11,.04);border-color:rgba(245,158,11,.12)}
.dc-log{background:rgba(56,189,248,.04);border-color:rgba(56,189,248,.12)}
.dc-ana{background:rgba(167,139,250,.04);border-color:rgba(167,139,250,.12)}
.dc-vault{background:rgba(52,211,153,.04);border-color:rgba(52,211,153,.12)}

/* QUICK PROMPTS */
#quick-prompts{padding:20px 14px;display:flex;flex-direction:column;gap:8px}
.qp-title{font-size:11px;color:#475569;margin-bottom:4px}
.qp-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:8px 12px;color:#94a3b8;font-size:11px;cursor:pointer;text-align:left;transition:.15s;line-height:1.4}
.qp-btn:hover{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25);color:#c7d2fe}
.qp-agent{font-size:9px;color:#475569;margin-top:2px}

/* MAP */
#map{width:100%;flex:1;z-index:1}
.map-legend{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(13,22,41,.9);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 14px;display:flex;gap:12px;font-size:10px;z-index:10;backdrop-filter:blur(8px)}
.legend-item{display:flex;align-items:center;gap:4px;color:#94a3b8}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* PROFIT CALC */
.calc-section{padding:10px 14px}
.calc-label{font-size:10px;color:#64748b;margin-bottom:4px;display:flex;justify-content:space-between}
.calc-label span{color:#e2e8f0;font-weight:600}
input[type=range]{width:100%;height:3px;appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none;margin-bottom:10px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:#6366f1;cursor:pointer}
.toggle-group{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.toggle-btn{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#64748b;font-size:10px;cursor:pointer;transition:.15s}
.toggle-btn.on{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#c7d2fe}
.profit-display{background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.2);border-radius:10px;padding:14px;margin:10px 14px;text-align:center}
.profit-main{font-size:28px;font-weight:800;color:#00c9a7}
.profit-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.cost-table{margin:0 14px 10px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.ct-row{display:flex;justify-content:space-between;padding:5px 10px;font-size:10.5px;border-bottom:1px solid rgba(255,255,255,.04)}
.ct-row:last-child{border-bottom:none;background:rgba(255,255,255,.02)}
.ct-label{color:#64748b}.ct-val{color:#e2e8f0;font-weight:500}
.rec-list{margin:0 14px 14px}
.rec-item{font-size:10px;color:#94a3b8;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:6px}
.rec-item:last-child{border:none}
.rec-dot{color:#6366f1;flex-shrink:0}

/* DEMO CTRL */
.ctrl-progress{margin:10px 14px 0;background:rgba(255,255,255,.06);border-radius:3px;height:4px;overflow:hidden}
.ctrl-bar{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:3px;transition:.4s}
.ctrl-label{margin:6px 14px;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between}
.ctrl-btns{display:flex;gap:6px;padding:6px 14px}
.ctrl-btn{flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:11px;cursor:pointer;transition:.15s}
.ctrl-btn:hover:not(:disabled){background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#c7d2fe}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.ctrl-btn.play{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-weight:600}
.ctrl-btn.play:hover{opacity:.85}
.scene-list{margin:8px 14px 0;flex:1;overflow-y:auto}
.scene-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;transition:.15s;margin-bottom:2px;font-size:10.5px;color:#64748b}
.scene-item:hover{background:rgba(255,255,255,.03);color:#94a3b8}
.scene-item.active{background:rgba(99,102,241,.1);color:#c7d2fe}
.scene-item.done{color:#475569}
.scene-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.scene-item.active .scene-num{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);color:#c7d2fe}
.scene-item.done .scene-num{background:rgba(0,201,167,.15);border-color:rgba(0,201,167,.3);color:#00c9a7}

/* MODE SWITCH */
.mode-switch{display:flex;margin:10px 14px 6px;background:rgba(255,255,255,.04);border-radius:6px;padding:2px}
.mode-btn{flex:1;padding:5px;font-size:10px;font-weight:600;border:none;background:transparent;color:#64748b;cursor:pointer;border-radius:5px;transition:.15s}
.mode-btn.active{background:rgba(99,102,241,.2);color:#c7d2fe}

/* ANIMATIONS */
.cursor{display:inline-block;width:2px;height:12px;background:#6366f1;animation:blink-c .6s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink-c{50%{opacity:0}}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-logo">
    <div class="badge">明心数智</div>

  </div>

</div>

<div id="main">
  <!-- LEFT: Journey + Agents -->
  <div id="left">

  <!-- CENTER -->

        <div class="legend-item"><div class="legend-dot" style="background:#00c9a7"></div>洛杉矶</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('right','profit')">利润核算</button>
      <button class="tab-btn" onclick="switchTab('right','demo')">演示控制</button>
    </div>
    <!-- PROFIT CALC -->
    <div class="tab-pane active" id="right-profit" style="overflow-y:auto">
      <div class="calc-section">

        <input type="range" min="680" max="760" value="720" id="sl-fx" oninput="calcProfit()">
        <div class="toggle-group">
          <button class="toggle-btn on" id="tg-air" onclick="toggleShip('air')">✈ 空运</button>

function routeAgent(msg){
  const m=msg.toLowerCase();
  if(m.includes('采购')||m.includes('库存')||m.includes('融资')||m.includes('工厂')||m.includes('sku')||m.includes('产能'))return'supply';
  if(m.includes('达人')||m.includes('营销')||m.includes('tiktok')||m.includes('listing')||m.includes('广告'))return'marketing';
  if(m.includes('报关')||m.includes('清关')||m.includes('退税')||m.includes('fda')||m.includes('合规')||m.includes('税'))return'compliance';
  if(m.includes('物流')||m.includes('运输')||m.includes('港口')||m.includes('海运')||m.includes('空运')||m.includes('运踪'))return'logistics';
  if(m.includes('利润')||m.includes('成本')||m.includes('核算')||m.includes('分析')||m.includes('行动'))return'analyst';
  if(m.includes('存证')||m.includes('审计')||m.includes('哈希')||m.includes('溯源'))return'vault';
  return'orchestrator';
}

async function runScene(idx){
  if(demoBusy)return;
  demoBusy=true;
  const s=SCENES[idx];
  document.getElementById('quick-prompts').style.display='none';
  document.getElementById('hdr-label').textContent=s.hStatus;
  activeJourneyNodes=s.journey;
  renderJourney();
  renderAgentStatus(s.agents);
  animateMapToScene(idx);

  for(const m of s.msgs){
    if(m.delay>0)await sleep(m.delay);
    appendMsg(m.cls,m.av,m.sender,m.html,false);
  }
  if(s.cards.length){
    await sleep(300);
    s.cards.forEach(c=>appendCard(c));
  }
  demoScene=idx;
  renderSceneList();
  demoBusy=false;
}

async function instantReplay(upTo){
  // Synchronously replay scenes 0..upTo without delays
  clearChat();
  for(let i=0;i<=upTo;i++){
    const s=SCENES[i];
    activeJourneyNodes=s.journey;
    for(const m of s.msgs)appendMsg(m.cls,m.av,m.sender,m.html,true);
    if(s.cards.length)s.cards.forEach(c=>appendCard(c));
  }
  const s=SCENES[upTo];
  document.getElementById('hdr-label').textContent=s.hStatus;
  renderJourney();
  renderAgentStatus(s.agents);
  animateMapToScene(upTo);
  demoScene=upTo;
  renderSceneList();
}

async function jumpToScene(idx){
  if(demoBusy)return;
  if(idx===demoScene)return;
  if(idx<demoScene||demoScene<0){
    await instantReplay(idx);
  } else {
    for(let i=demoScene+1;i<=idx;i++)await runScene(i);
  }
}

function goNext(){
  if(demoBusy||demoScene>=SCENES.length-1)return;
  runScene(demoScene+1);
}
function goPrev(){
  if(demoBusy||demoScene<=0)return;
  instantReplay(demoScene-1);
}
function resetDemo(){
  if(demoBusy)return;
  clearChat();
  demoScene=-1;
  activeJourneyNodes=[];
  renderJourney();
  renderAgentStatus([]);
  renderSceneList();
  document.getElementById('hdr-label').textContent='等待指令…';
  document.getElementById('quick-prompts').style.display='flex';
  resetMap();
}
function demoMode(){

}

  typingDiv.className=`msg ${agentId}`;
  typingDiv.id='typing-indicator';
  typingDiv.innerHTML=`<div class="av" style="background:rgba(${hexToRgb(cfg.color)},.2);color:${cfg.color}">${cfg.av}</div><div><div class="msg-meta">${cfg.name}</div><div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
  msgs.appendChild(typingDiv);
  msgs.scrollTop=msgs.scrollHeight;

  renderAgentStatus([agentId]);
  document.getElementById('send-btn').disabled=true;
  document.getElementById('hdr-label').textContent=cfg.name+' · 思考中…';

  const messages=[{role:'system',content:cfg.sp},...msgHistory.slice(-6)];
  let fullResp='';

  try{
    // Try Next.js proxy first (works when served from Next.js server)
    // Falls back to direct gateway (works within server sandbox)
    let res;
    let useProxy=true;
    try{
      res=await fetch(AI_PROXY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:text,agentId,history:msgHistory.slice(-6)})
      });
      if(!res.ok)throw new Error('proxy '+res.status);
    }catch(proxyErr){
      useProxy=false;
      res=await fetch(`${AI_BASE}/api/v1/chat/completions`,{
        method:'POST',
        headers:{'Authorization':'Bearer '+AI_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({model:AI_MODEL,messages,stream:true,max_tokens:600})
      });
      if(!res.ok)throw new Error('API '+res.status);
    }

    const reader=res.body.getReader();
    const dec=new TextDecoder();

    // Replace typing with real bubble
    typingDiv.querySelector('.bubble').innerHTML='<span class="cursor"></span>';
    const bubble=typingDiv.querySelector('.bubble');

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      const chunk=dec.decode(value);
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();
        if(data==='[DONE]')continue;
        try{
          const j=JSON.parse(data);
          // Next.js proxy format: {type:'delta',content:'...'}
          // Direct gateway format: {choices:[{delta:{content:'...'}}]}
          const delta=useProxy?(j.type==='delta'?j.content:''):(j.choices?.[0]?.delta?.content||'');
          if(delta){
            fullResp+=delta;
            bubble.innerHTML=fullResp.replace(/\n/g,'<br>')+'<span class="cursor"></span>';
            msgs.scrollTop=msgs.scrollHeight;
          }
        }catch(e){}
      }
    }
    typingDiv.querySelector('.cursor')?.remove();
    msgHistory.push({role:'assistant',content:fullResp});
  }catch(err){
    typingDiv.querySelector('.bubble').innerHTML=`<span style="color:#f87171">AI连接不可用（请通过 Next.js 服务访问以启用实时对话）</span>`;
  }

  document.getElementById('send-btn').disabled=false;
  document.getElementById('hdr-label').textContent=cfg.name+' · 已回复';
  renderAgentStatus([]);
}

function sendPreset(text){
  document.getElementById('chat-input').value=text;
  sendMsg();
}

// ============================================================
// MAP
// ============================================================
function initMap(){
  const map=L.map('map',{
    center:[30,140],zoom:3,
    zoomControl:true,
    attributionControl:false
  });
  mapObj=map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19
  }).addTo(map);

  // Draw route
  const coords=JOURNEY_NODES.map(n=>[n.lat,n.lng]);
  routeLine=L.polyline(coords,{color:'#6366f1',weight:1.5,dashArray:'6 4',opacity:.5}).addTo(map);

  // Draw node markers
  JOURNEY_NODES.forEach((n,i)=>{
    const mk=L.circleMarker([n.lat,n.lng],{
      radius:7,color:n.color,fillColor:n.color,fillOpacity:.3,weight:2
    }).addTo(map).bindTooltip(`<span style="font-size:11px">${n.icon} ${n.label}</span>`,{permanent:false});
    mapNodeMarkers.push(mk);
  });

  // Ship marker
  const shipIcon=L.divIcon({
    html:'<div style="font-size:18px;filter:drop-shadow(0 0 4px rgba(99,102,241,.8))">✈️</div>',
    iconSize:[24,24],iconAnchor:[12,12],className:''
  });
  shipMarker=L.marker([29.29,117.18],{icon:shipIcon}).addTo(map);
}

function resetMap(){
  if(!mapObj)return;
  mapNodeMarkers.forEach(mk=>mk.setStyle({fillOpacity:.3}));
  if(shipMarker)shipMarker.setLatLng([29.29,117.18]);
  mapObj.flyTo([30,140],3,{duration:.5});
}

const SCENE_MAP_WAYPOINT=[null,0,4,2,3,4,4];
function animateMapToScene(sceneIdx){
  if(!mapObj)return;
  const wp=SCENE_MAP_WAYPOINT[sceneIdx];
  if(wp===null||wp===undefined)return;
  const node=JOURNEY_NODES[wp];
  if(!node)return;
  // Highlight nodes up to this waypoint
  for(let i=0;i<=wp;i++){
    mapNodeMarkers[i]?.setStyle({fillOpacity:.9,color:JOURNEY_NODES[i].color,weight:3});
  }
  // Move ship
  if(shipMarker){
    const isAir=wp>=2;
    const icon=L.divIcon({
      html:`<div style="font-size:18px;filter:drop-shadow(0 0 6px ${JOURNEY_NODES[wp].color}AA)">${isAir?'✈️':'🚢'}</div>`,
      iconSize:[24,24],iconAnchor:[12,12],className:''
    });
    shipMarker.setIcon(icon);
    shipMarker.setLatLng([node.lat,node.lng]);
  }
  mapObj.flyTo([node.lat,node.lng],wp===2?3:4,{duration:1.2});
}

// ============================================================
// PROFIT CALCULATOR
// ============================================================
let shipMode='air',market='la';
function toggleShip(m){
  shipMode=m;
  document.getElementById('tg-air').classList.toggle('on',m==='air');
  document.getElementById('tg-sea').classList.toggle('on',m==='sea');
  calcProfit();
}
function toggleMarket(m){
  market=m;
  document.getElementById('tg-la').classList.toggle('on',m==='la');
  document.getElementById('tg-ny').classList.toggle('on',m==='ny');
  calcProfit();
}
function calcProfit(){
  const price=+document.getElementById('sl-price').value;
  const cost=+document.getElementById('sl-cost').value;
  const ads=+document.getElementById('sl-ads').value;
  const fx=(+document.getElementById('sl-fx').value)/100;
  document.getElementById('lbl-price').textContent='$'+price;
  document.getElementById('lbl-cost').textContent='¥'+cost;
  document.getElementById('lbl-ads').textContent='¥'+ads;
  document.getElementById('lbl-fx').textContent=fx.toFixed(2);

  const revenue=price*fx;
  const freight1=18,freight3=38;
  const freight2=shipMode==='air'?52:18;
  const taxRate=market==='la'?0.095:0.08875;
  const salesTax=Math.round(revenue*taxRate);
  const fxLoss=Math.round(revenue*0.012);
  const totalCost=cost+freight1+freight2+freight3+ads+salesTax+fxLoss;
  const profit=Math.round(revenue-totalCost);
  const margin=((profit/revenue)*100).toFixed(1);

  document.getElementById('profit-main').textContent='¥ '+profit;
  document.getElementById('profit-main').style.color=profit>0?'#00c9a7':profit>-50?'#f59e0b':'#f87171';
  document.getElementById('profit-sub').textContent=`利润率 ${margin}% · ${shipMode==='air'?'空运':'海运'} · ${market==='la'?'洛杉矶':'纽约'}`;

  document.getElementById('cost-table').innerHTML=[
    ['收入（含汇率）','¥ '+Math.round(revenue),''],
    ['出厂成本','- ¥ '+cost,''],
    ['头程物流','- ¥ '+freight1,''],
    [shipMode==='air'?'空运干线':'海运干线','- ¥ '+freight2,shipMode==='air'?'color:#38bdf8':''],
    ['尾程派送','- ¥ '+freight3,''],
    ['广告花费','- ¥ '+ads,''],
    [`${market==='la'?'加州':'纽约'} Sales Tax`,'- ¥ '+salesTax,''],
    ['汇损 (1.2%)','- ¥ '+fxLoss,''],
    ['净利润','¥ '+profit,profit>0?'color:#00c9a7':profit<0?'color:#f87171':'color:#f59e0b']
  ].map(([l,v,s])=>`<div class="ct-row"><span class="ct-label">${l}</span><span class="ct-val" style="${s}">${v}</span></div>`).join('');

  const recs=[];
  if(profit<100&&shipMode==='air')recs.push('切换海运可降低干线成本约 ¥34');
  if(ads>80)recs.push('广告花费偏高，建议优化达人合作替代付费流量');
  if(profit>150)recs.push('利润充裕，可考虑提升备货量获取规模效应');
  if(market==='la'&&profit>0)recs.push('加州 Sales Tax 较高，NY市场税率 8.875% 可对比');
  if(price<50)recs.push('定价偏低，Jingdezhen 非遗故事溢价空间较大');
  document.getElementById('rec-list').innerHTML=recs.slice(0,3).map(r=>`<div class="rec-item"><span class="rec-dot">›</span>${r}</div>`).join('');
}
</script>
